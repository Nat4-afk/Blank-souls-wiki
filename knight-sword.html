<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki - Knight Sword</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    /* ===== CONTENEDOR GENERAL ===== */
    .layout {
      display: flex;
    }

    /* ===== MENÚ LATERAL ===== */
    .menu {
      width: 200px;
      height: 100vh;
      background: #1a1a1a;
      padding: 15px;
      box-sizing: border-box;
      position: fixed;
    }

    .menu h2 {
      margin-top: 0;
    }

    .menu a {
      display: block;
      color: #ccc;
      text-decoration: none;
      padding: 8px;
      border-radius: 5px;
      margin-top: 5px;
    }

    .menu a:hover {
      background: #333;
      color: white;
    }

    /* ===== CONTENIDO ===== */
    .contenido {
      margin-left: 220px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== PANEL ===== */
    .panel {
      display: flex;
      gap: 20px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      align-items: center;
    }

    .imagen {
      width: 150px;
      border-radius: 10px;
      image-rendering: pixelated;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ===== BLOQUES ===== */
    .bloque {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
    }

    .bloque h2 {
      margin-top: 0;
      color: violet;
    }

  </style>
</head>

<body>

<button>☰</button>

<div>
  <h2>Menú</h2>

  <a href="#">Inicio</a>
  <a href="#">Armas</a>
  <a href="#">Definitivas</a>
</div>

  <div class="layout">

    <!-- CONTENIDO -->
    <div class="contenido">

      <h1>Knight Sword</h1>

      <div class="panel">
        <img src="knight-sword.png" class="imagen">

        <div class="info">
          <p><b>Juego:</b> Blank Souls II</p>
          <p><b>Categoría:</b> Definitiva</p>
        </div>
      </div>

      <div class="bloque">
        <h2>Descripción</h2>
        <p>Arma inicial de la clase caballero, confiable en el inicio.</p>
      </div>

      <div class="bloque">
        <h2>Obtención</h2>
        <p>Escoge la clase caballero al comenzar el juego.</p>
      </div>

      <div class="bloque">
        <h2>Estadísticas</h2>
        <p>Daño: Bajo</p>
        <p>Velocidad: Media</p>
      </div>

    </div>

  </div>

</body>
</html>
